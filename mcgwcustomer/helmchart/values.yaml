# Default values for mcgwcustomer.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1
name: "mcgwcustomer"
image:
  repository: localhost:15000/mcgwcustomer
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: dev

imageEnvSubst:
  repository: localhost:15000
  name: envsubst
  tag: latest
  pullPolicy: IfNotPresent

secret:
  ref: mcgw-secret

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""


port: 9090
targetPort: 9090-tcp
dev:
  host: "-esb-dev.apps.ocp4dev.muf.co.id"
uat:
  host: "-esb-uat.apps.ocp4dev.muf.co.id"
prod:
  host: "-esb.apps.ocpdc.muf.co.id"
proddrc:
  host: "-esb.apps.ocpdrc.muf.co.id"

