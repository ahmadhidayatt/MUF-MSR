# Default values for mufapplication.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: localhost:15000/mufapplication
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: dev

imageEnvSubst:
  repository: localhost:15000
  name: envsubst
  tag: latest
  pullPolicy: IfNotPresent

configmap:
  ref: msr-config

secret:
  ref: msr-secret
  
sidecar:
  enabled: true
    
sidecarimage:
  repository: localhost:15000/infra
  name: fluentd
  tag: es8
  pullPolicy: Always

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

targetPort: 5555-tcp

dev:
  host: "-esb-dev.apps.ocp4dev.muf.co.id"
uat:
  host: "-esb-uat.apps.ocp4dev.muf.co.id"
prod:
  host: "-esb.apps.ocpdc.muf.co.id"
proddrc:
  host: "-esb.apps.ocpdrc.muf.co.id"
  
readiness:
  initialDelaySeconds: 5
  periodSeconds: 10

liveness:
  initialDelaySeconds: 15
  periodSeconds: 10

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
  averageUtilization: 70

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""


podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 5555
  weight: 100

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  limits:
   cpu: 500m
   memory: 1250Mi
  requests:
     cpu: 250m
     memory: 512Mi

sidecarresources:
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  limits:
   cpu: 70m
   memory: 256Mi
  requests:
     cpu: 50m
     memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}
