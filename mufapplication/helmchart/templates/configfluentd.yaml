apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Chart.Name }}-fluentd-config
data:
  fluent.conf: |
{{- if eq .Values.env "dev" }}
{{- (.Files.Get "config/dev/fluentd.conf") | nindent 3 }}
{{- else if eq .Values.env "uat" }}
{{- (.Files.Get "config/uat/fluentd.conf") | nindent 3 }}
{{- else if eq .Values.env "prod" }}
{{- (.Files.Get "config/prod/fluentd.conf") | nindent 3 }}
{{- else if eq .Values.env "proddrc" }}
{{- (.Files.Get "config/proddrc/fluentd.conf") | nindent 3 }}
{{- else }}
{{- (.Files.Get "config/dev/fluentd.conf") | nindent 3 }}
{{- end }}
