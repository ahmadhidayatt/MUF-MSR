apiVersion: v1
kind: Service
metadata:
  name: {{ include "muffinance.fullname" . }}
  labels:
    {{- include "muffinance.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: {{ .Values.targetPort }}
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
  selector:
    {{- include "muffinance.selectorLabels" . | nindent 4 }}